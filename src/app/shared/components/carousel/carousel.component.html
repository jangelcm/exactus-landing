<div
  class="relative w-full min-h-[500px] md:min-h-[550px] lg:min-h-[calc(100vh-120px)] overflow-hidden select-none bg-black/90"
  role="region" aria-roledescription="carousel" aria-label="Servicios destacados de Exactus"
  (touchstart)="onTouchStart($event)" (touchend)="onTouchEnd($event)">

  <ng-container *ngIf="slides.length">

    <!-- Media -->
    <div class="absolute inset-0 h-[500px] md:h-[550px] lg:h-[calc(100vh-120px)]">

      <img [src]="slides[current].image"
        [alt]="slides[current].alt || 'Imagen de ' + (slides[current].title || 'servicio Exactus')"
        [attr.width]="slides[current].width || 1920" [attr.height]="slides[current].height || 900"
        [attr.fetchpriority]="current === 0 ? 'high' : 'auto'" [attr.loading]="current === 0 ? 'eager' : 'lazy'"
        class="w-full h-full object-cover transition-all duration-700 ease-out" (load)="onImageLoad()" />
      <!-- Overlay oscuro elegante -->
      <div class="absolute inset-0 bg-gradient-to-br from-black/100 via-black/50 to-black/50"></div>

    </div>

    <!-- CONTENIDO HERO -->
    <div class="relative z-10 w-full min-h-[500px] md:min-h-[550px] lg:min-h-[calc(100vh-120px)] flex items-center">
      <div class="max-w-7xl mx-auto h-min-content w-full px-6 py-12 md:py-16 lg:py-20">
        <div class="max-w-2xl">
          <div appAnimateOnScroll [animationType]="'fadeIn'" [animationDuration]="800">
            <!-- Eyebrow -->
            <p class="text-[rgb(var(--color-primary-light))] uppercase tracking-widest md:text-lg text-sm font-bold mb-3"
              appAnimateOnScroll [animationType]="'slideUp'" [animationDelay]="200">
              Asesoría Contable, Legal & Tributaria en Perú
            </p>

            <!-- Título principal -->
            <h1 class="text-white text-4xl  md:text-6xl font-extrabold mb-4 drop-shadow" appAnimateOnScroll
              [animationType]="'slideUp'" [animationDelay]="400">
              {{ slides[current].title }}
            </h1>

            <!-- Descripción -->
            <p class="text-white/90 text-base md:text-lg mb-8 leading-relaxed" appAnimateOnScroll
              [animationType]="'slideUp'" [animationDelay]="600">
              {{ slides[current].description }}
            </p>

            <!-- CTAs -->
            <div class="flex flex-col sm:flex-row gap-4" appAnimateOnScroll [animationType]="'slideUp'"
              [animationDelay]="800">
              <button routerLink="/contacto" [attr.title]="'Solicitar asesoría en ' + slides[current].title"
                aria-label="Botón de Agenda una consulta con Exactus"
                class="bg-[rgb(var(--color-primary))] text-white px-6 py-3 rounded-lg font-semibold shadow-lg hover:bg-[rgb(var(--color-primary-dark))] transition">
                Agenda una consulta
              </button>

              <a *ngIf="slides[current].link" [routerLink]="slides[current].link"
                aria-label="Botón de Conoce nuestros servicios"
                class="border border-white/70 text-center text-white px-6 py-3 rounded-lg font-semibold hover:bg-white/10 transition">
                Conoce nuestros servicios
              </a>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- Flechas -->
    <button *ngIf="showArrows" (click)="prev()" aria-label="Ver slide anterior"
      class="absolute left-4 top-1/10  sm:top-1/2 -translate-y-1/2 bg-white/90 hover:bg-white text-[rgb(var(--color-primary-light))] rounded-full p-3 shadow-xl z-20 hidden sm:block">
      <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
      </svg>
    </button>

    <button *ngIf="showArrows" (click)="next()" aria-label="Ver siguiente slide"
      class="absolute right-4 top-1/10  sm:top-1/2 -translate-y-1/2 bg-white/90 hover:bg-white text-[rgb(var(--color-primary-light))] rounded-full p-3 shadow-xl z-20 hidden sm:block">
      <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
      </svg>
    </button>

    <!-- Indicadores elegantes abajo -->
    <div class="absolute bottom-6 left-0 right-0 flex justify-center gap-3 z-20">
      <!-- <button *ngFor="let s of slides; let i = index" (click)="goTo(i)"
        [attr.aria-label]="'Ir al slide ' + (i + 1) + ': ' + (s.title || 'servicio Exactus')"
        [attr.aria-current]="current === i ? 'true' : null"
        class="w-3 h-3 rounded-full border-2 border-white bg-white/40 hover:bg-white focus:bg-yellow-300 focus:outline-none focus:ring-2 focus:ring-yellow-300 transition"
        appAnimateOnScroll [animationType]="'fadeIn'" [animationDelay]="i * 100">
        <span class="sr-only">Ir al slide {{ i + 1 }}</span>
      </button> -->
    </div>

  </ng-container>
</div>
