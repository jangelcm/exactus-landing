<header role="banner"
        class="sticky top-0 z-50 bg-[rgb(var(--color-bg-primary))] border-b border-[rgb(var(--color-primary))]">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8" role="navigation" aria-label="Navegación principal">
                <div class="flex justify-between items-center h-20 md:h-24">

                        <div class="flex items-center">
                                <a routerLink="/" aria-label="Exactus - Ir al inicio" class="flex items-center">
                                        <img src="assets/logo.svg" alt="Exactus Logo"
                                                class="h-10 w-[60%] md:h-14 transition-all duration-300" />
                                </a>
                        </div>

                        <div class="flex items-center sm:hidden">
                                <button (click)="open = !open"
                                        class="inline-flex items-center justify-center p-2 rounded-md text-[rgb(var(--color-primary))] hover:bg-gray-100 focus:outline-none"
                                        [attr.aria-expanded]="open" aria-controls="mobile-menu">
                                        <span class="sr-only">Abrir menú</span>
                                        <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path *ngIf="!open" stroke-linecap="round" stroke-linejoin="round"
                                                        stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                                                <path *ngIf="open" stroke-linecap="round" stroke-linejoin="round"
                                                        stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                </button>
                        </div>

                        <div class="hidden sm:flex sm:items-center sm:gap-4 md:gap-8">
                                <ul class="flex items-center gap-4 md:gap-6 text-lg lg:text-xl font-medium"
                                        role="menubar">
                                        <li role="none">
                                                <a routerLink="/"
                                                        routerLinkActive="text-[rgb(var(--color-primary))] font-bold"
                                                        [routerLinkActiveOptions]="{exact: true}"
                                                        class="hover:text-[rgb(var(--color-primary))] transition-colors p-2">Inicio</a>
                                        </li>
                                        <li role="none">
                                                <a routerLink="/nosotros"
                                                        routerLinkActive="text-[rgb(var(--color-primary))] font-bold"
                                                        class="hover:text-[rgb(var(--color-primary))] transition-colors p-2">Nosotros</a>
                                        </li>

                                        <li role="none" class="relative group"
                                                (mouseenter)="openServiciosDropdown = true"
                                                (mouseleave)="openServiciosDropdown = false">
                                                <button class="flex items-center gap-1 hover:text-[rgb(var(--color-primary))] transition-colors p-2 focus:outline-none"
                                                        [class.font-bold]="openServiciosDropdown">
                                                        Servicios
                                                        <svg class="h-4 w-4 transform transition-transform"
                                                                [ngClass]="{'rotate-180': openServiciosDropdown}"
                                                                fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                                <path stroke-linecap="round" stroke-linejoin="round"
                                                                        stroke-width="2" d="M19 9l-7 7-7-7" />
                                                        </svg>
                                                </button>

                                                <div *ngIf="openServiciosDropdown"
                                                        class="absolute left-0 w-72 bg-white shadow-xl rounded-b-lg border-t-4 border-[rgb(var(--color-primary))] py-2 animate-fade-in">
                                                        <a *ngFor="let servicio of servicios"
                                                                (click)="navigateToService(servicio.slug)"
                                                                class="block px-4 py-3 hover:bg-[rgb(var(--color-primary))]/10 cursor-pointer border-b last:border-0 border-gray-100 transition-colors">
                                                                <p class="text-sm font-bold text-gray-900 ">
                                                                        {{servicio.title}}</p>
                                                                <p class="text-xs text-gray-500">
                                                                        {{servicio.description}}</p>
                                                        </a>
                                                </div>
                                        </li>

                                        <li role="none"><a routerLink="/blog"
                                                        routerLinkActive="text-[rgb(var(--color-primary))] font-bold"
                                                        class="hover:text-[rgb(var(--color-primary))] transition-colors p-2">Blog</a>
                                        </li>
                                        <li role="none"><a routerLink="/contacto"
                                                        routerLinkActive="text-[rgb(var(--color-primary))] font-bold"
                                                        class="hover:text-[rgb(var(--color-primary))] transition-colors p-2">Contacto</a>
                                        </li>
                                </ul>

                                <div class="flex items-center ml-2 border-l pl-4 border-gray-200 gap-2">
                                        <button (click)="changeLanguage('es')"
                                                [class.text-[rgb(var(--color-primary))]]="currentLang === 'es'"
                                                class="text-lg font-bold hover:opacity-70">ES</button>
                                        <span class="text-gray-300">|</span>
                                        <button (click)="changeLanguage('en')"
                                                [class.text-[rgb(var(--color-primary))]]="currentLang === 'en'"
                                                class="text-lg font-bold hover:opacity-70">EN</button>
                                </div>

                                <button *ngIf="authService.isAdmin$ | async" (click)="logout()"
                                        class="ml-4 p-2 bg-red-50 text-red-600 rounded-full hover:bg-red-600 hover:text-white transition-all">
                                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                                        </svg>
                                </button>
                        </div>
                </div>
        </nav>

        <div *ngIf="open" id="mobile-menu"
                class="sm:hidden bg-white border-t border-gray-100 shadow-inner animate-fade-in">
                <div class="px-4 pt-2 pb-6 space-y-1">
                        <a routerLink="/" (click)="open=false"
                                class="block px-3 py-4 text-base font-medium border-b border-gray-50">Inicio</a>
                        <a routerLink="/nosotros" (click)="open=false"
                                class="block px-3 py-4 text-base font-medium border-b border-gray-50">Nosotros</a>

                        <div>
                                <button (click)="openServiciosDropdownMobile = !openServiciosDropdownMobile"
                                        class="w-full flex justify-between items-center px-3 py-4 text-base font-medium border-b border-gray-50">
                                        Servicios
                                        <svg class="h-4 w-4 transform transition-transform"
                                                [ngClass]="{'rotate-180': openServiciosDropdownMobile}" fill="none"
                                                viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                        d="M19 9l-7 7-7-7" />
                                        </svg>
                                </button>
                                <div *ngIf="openServiciosDropdownMobile" class="bg-gray-50 pl-4">
                                        <a *ngFor="let s of servicios" (click)="navigateToService(s.slug)"
                                                class="block px-3 py-3 text-sm text-gray-600 border-b border-white">{{s.title}}</a>
                                </div>
                        </div>

                        <a routerLink="/blog" (click)="open=false"
                                class="block px-3 py-4 text-base font-medium border-b border-gray-50">Blog</a>
                        <a routerLink="/contacto" (click)="open=false"
                                class="block px-3 py-4 text-base font-medium">Contacto</a>

                        <div class="grid grid-cols-2 gap-2 mt-6">
                                <button (click)="changeLanguage('es')"
                                        [ngClass]="currentLang === 'es' ? 'bg-[rgb(var(--color-primary))] text-white' : 'bg-gray-100 text-gray-600'"
                                        class="py-3 rounded-lg font-bold">Español</button>
                                <button (click)="changeLanguage('en')"
                                        [ngClass]="currentLang === 'en' ? 'bg-[rgb(var(--color-primary))] text-white' : 'bg-gray-100 text-gray-600'"
                                        class="py-3 rounded-lg font-bold">English</button>
                        </div>
                </div>
        </div>
</header>
